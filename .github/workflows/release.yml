name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Honeycomb.slnx

      - name: Test
        run: dotnet test Honeycomb.slnx --configuration Release --verbosity normal

      - name: Publish
        run: >
          dotnet publish src/Honeycomb/Honeycomb.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish

      - name: Archive
        run: Compress-Archive -Path ./publish/* -DestinationPath Honeycomb-win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Honeycomb-win-x64.zip
          generate_release_notes: true
